services:
  postgresql:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: health_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./compose/keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro,z
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  database-migrations:
    image: pfeiffermax/health-monitor-backend:latest
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgresql:5432/health_monitor
      DATABASE_ALEMBIC_MIGRATION_ROLLBACK: "false"
      DATABASE_ALEMBIC_MIGRATION_REVISION: INVALID
    command: database-migrations
    depends_on:
      postgresql:
        condition: service_healthy

  health-monitor-backend:
    image: pfeiffermax/health-monitor-backend:latest
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgresql:5432/health_monitor
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: health-monitor
    command: health-monitor-backend
    ports:
      - "8000:8000"
    depends_on:
      database-migrations:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy

  health-monitor-frontend:
    build:
      context: .
      dockerfile: Containerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_KEYCLOAK_URL: http://localhost:8080
        VITE_KEYCLOAK_REALM: health-monitor
        VITE_KEYCLOAK_CLIENT_ID: health-monitor-frontend
    ports:
      - "8081:80"
    depends_on:
      health-monitor-backend:
        condition: service_started

volumes:
  postgres_data:
