name: Container

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"

jobs:
  build:
    name: Build container image
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      # Register QEMU binfmt handlers so Podman can build/run the arm64 image
      # on the amd64 runner via emulation.
      - name: Set up QEMU for cross-architecture builds
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build multi-architecture image
        run: |
          podman build \
            --platform linux/amd64,linux/arm64 \
            --manifest health-monitor-frontend:ci \
            --build-arg VITE_API_BASE_URL=http://localhost:8000 \
            --build-arg VITE_KEYCLOAK_URL=http://localhost:8080 \
            --build-arg VITE_KEYCLOAK_REALM=health-monitor \
            --build-arg VITE_KEYCLOAK_CLIENT_ID=health-monitor-frontend \
            -f Containerfile \
            .

      - name: Verify manifest contains both architectures
        run: |
          podman manifest inspect health-monitor-frontend:ci
          for arch in amd64 arm64; do
            podman manifest inspect health-monitor-frontend:ci \
              | jq -e --arg arch "$arch" \
                  '.manifests[] | select(.platform.architecture == $arch)' > /dev/null \
              || { echo "manifest is missing architecture: $arch"; exit 1; }
          done

      - name: Smoke-test each architecture
        run: |
          for arch in amd64 arm64; do
            echo "=== smoke-testing linux/$arch ==="
            podman run -d --rm --name "hmf-$arch" --arch "$arch" \
              -p 8081:80 health-monitor-frontend:ci
            ready=
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8081/ > /tmp/index.html; then
                ready=1
                break
              fi
              sleep 1
            done
            podman stop "hmf-$arch"
            [ -n "$ready" ] || { echo "container for $arch did not become ready"; exit 1; }
            grep -qi 'health' /tmp/index.html \
              || { echo "index.html did not contain expected content"; cat /tmp/index.html; exit 1; }
          done